<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>小陪芽</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --p: #9B59B6; --p2: #C39BD3; --pk: #F1948A; --bg: #FDFBFF;
  --text: #2C1654; --sub: #9B84B0; --border: #EDE0F7;
  --grad: linear-gradient(135deg, #9B59B6, #F1948A);
  --card-shadow: 0 8px 32px rgba(155,89,182,0.12);
}
body { font-family: -apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
button { cursor: pointer; border: none; font-family: inherit; transition: all .15s; }
button:active { transform: scale(0.96); }
input, textarea { font-family: inherit; }
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }
#loginScreen {
  background: linear-gradient(135deg, #faf0fb 0%, #fff5f8 50%, #ffffff 100%);

  align-items: center; justify-content: center; padding: 40px 24px;
}
.login-illustration { width: 120px; height: 120px; margin: 0 auto 20px;
  background: white; border-radius: 50%; 
  box-shadow: 0 0 30px rgba(155,89,182,0.4), 0 0 60px rgba(155,89,182,0.15);
  display: flex; align-items: center; justify-content: center; font-size: 64px;
  animation: breathe 3s ease-in-out infinite; }
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 20px rgba(155,89,182,0.3), 0 0 40px rgba(155,89,182,0.1); }
  50% { box-shadow: 0 0 40px rgba(155,89,182,0.5), 0 0 80px rgba(155,89,182,0.2); } }
.login-brand { font-size: 28px; font-weight: 900; text-align: center;
  color: rgb(178, 76, 153); letter-spacing: 6px;
  margin-bottom: 6px; }

.login-tagline { font-size: 14px; color: var(--sub); text-align: center; margin-bottom: 36px; }
.login-box { width: 100%; max-width: 360px; background: white; border-radius: 28px;
  padding: 28px 24px; box-shadow: var(--card-shadow); }
.login-box .field { margin-bottom: 14px; }
.login-box .field input { width: 100%; border: 1.5px solid var(--border); border-radius: 14px;
  padding: 14px 16px; font-size: 15px; color: var(--text); outline: none;
  background: #FAFAFA; transition: border-color .2s; }
.login-box .field input:focus { border-color: var(--p); background: white; }
.login-btn { width: 100%; padding: 15px; border-radius: 16px;
  background: var(--grad); color: white; font-size: 16px; font-weight: 700;
  box-shadow: 0 6px 20px rgba(155,89,182,0.35); margin-top: 4px; }
.login-switch { text-align: center; margin-top: 18px; font-size: 14px; color: var(--sub); }
.login-switch span { color: var(--p); font-weight: 700; cursor: pointer; }
.error-text { color: #E74C3C; font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
#homeScreen { background: var(--bg); }
.home-header { padding: 56px 20px 16px; background: linear-gradient(160deg, #F0E6FF, #FFF0F5); }
.home-greeting { font-size: 13px; color: var(--sub); font-weight: 600; margin-bottom: 4px; }
.home-row { display: flex; align-items: center; justify-content: space-between; }
.home-title { font-size: 26px; font-weight: 900; color: var(--text); }
.home-sub { font-size: 13px; color: var(--sub); margin-top: 4px; }
.logout-btn { padding: 8px 16px; border-radius: 20px; background: white;
  color: var(--sub); font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); }
.kids-container { padding: 20px 16px; flex: 1; overflow-y: auto; }
.section-label { font-size: 12px; font-weight: 700; color: var(--sub);
  letter-spacing: .8px; margin-bottom: 14px; text-transform: uppercase; }
.kid-card { display: flex; align-items: center; gap: 14px; background: white;
  border-radius: 22px; padding: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow);
  cursor: pointer; }
.kid-card:active { transform: scale(0.97); }
.kid-face { width: 58px; height: 58px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; }
.boy-face { background: linear-gradient(135deg, #D6EAF8, #AED6F1); }
.girl-face { background: linear-gradient(135deg, #FDEBD0, #FADBD8); }
.kid-badge { position: absolute; bottom: -2px; right: -2px; width: 20px; height: 20px;
  border-radius: 50%; background: var(--grad); border: 2px solid white;
  display: flex; align-items: center; justify-content: center; font-size: 9px; color: white; }
.kid-info { flex: 1; }
.kid-name { font-size: 17px; font-weight: 800; }
.kid-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
.kid-emoji { font-size: 20px; }
.kid-delete-btn { padding: 6px 12px; border-radius: 12px; background: #E74C3C;
  color: white; font-size: 12px; font-weight: 700; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(231,76,60,0.3); }
.add-card { display: flex; align-items: center; justify-content: center; gap: 10px;
  background: white; border-radius: 22px; padding: 18px; border: 2px dashed var(--border);
  color: var(--p); font-size: 15px; font-weight: 700; width: 100%; margin-bottom: 12px; }
.empty-wrap { display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; padding: 60px 24px; text-align: center; }
.empty-emoji { font-size: 80px; margin-bottom: 20px; }
.empty-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--sub); line-height: 1.7; margin-bottom: 24px; }
#createScreen { background: var(--bg); }
.page-header { padding: 52px 20px 16px; display: flex; align-items: center; gap: 12px;
  background: white; border-bottom: 1px solid var(--border); }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg);
  font-size: 22px; color: var(--p); display: flex; align-items: center; justify-content: center; }
.page-title { font-size: 18px; font-weight: 800; }
.create-body { padding: 20px; overflow-y: auto; flex: 1; }
.field-label { font-size: 13px; font-weight: 700; color: var(--sub);
  margin-bottom: 8px; margin-top: 20px; display: block; }
.field-input { width: 100%; border: 1.5px solid var(--border); border-radius: 14px;
  padding: 14px 16px; font-size: 15px; color: var(--text); outline: none; background: white; }
.field-input:focus { border-color: var(--p); }
.choice-row { display: flex; gap: 10px; }
.choice-btn { flex: 1; padding: 15px 10px; border: 2px solid var(--border); border-radius: 16px;
  background: white; font-size: 15px; font-weight: 700; color: var(--sub); }
.choice-btn.on { border-color: var(--p); background: #F5ECF9; color: var(--p); }
.primary-btn { width: 100%; padding: 16px; border-radius: 18px; background: var(--grad);
  color: white; font-size: 16px; font-weight: 700; margin-top: 28px;
  box-shadow: 0 8px 24px rgba(155,89,182,0.35); }
.zodiac-display { font-size: 13px; font-weight: 700; color: var(--p);
  text-align: center; margin-top: 8px; min-height: 20px; letter-spacing: .4px;
  opacity: 0; transition: opacity .25s; line-height: 1.9; }
.zodiac-display.visible { opacity: 1; }
.zodiac-display .zodiac-line { display: block; }
#chatScreen { height: 100vh; height: 100dvh; background: #F5EFF9; display: none; flex-direction: column; }
#chatScreen.active { display: flex; }
.chat-header { padding: 52px 14px 10px; background: white;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 12px rgba(155,89,182,0.08); }
.chat-back { width: 36px; height: 36px; border-radius: 50%; background: var(--bg);
  font-size: 20px; color: var(--p); display: flex; align-items: center; justify-content: center; }
.chat-face { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 22px; }
.chat-kid-name { font-size: 16px; font-weight: 800; }
.chat-kid-status { font-size: 11px; color: var(--sub); margin-top: 2px; }
.online-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: #27AE60; margin-right: 4px; vertical-align: middle; }
.msgs-area { flex: 1; overflow-y: auto; padding: 14px 14px 8px;
  display: flex; flex-direction: column; gap: 10px; }
.quick-bar { padding: 8px 12px 6px; overflow-x: auto; display: flex; gap: 7px;
  background: white; border-top: 1px solid var(--border); flex-shrink: 0; scrollbar-width: none; }
.quick-bar::-webkit-scrollbar { display: none; }
.qbtn { white-space: nowrap; flex-shrink: 0; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: 20px; padding: 6px 13px;
  font-size: 12px; font-weight: 600; color: var(--p); }
.input-row { padding: 8px 12px 28px; background: white;
  border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 8px; align-items: flex-end; }
.msg-input { flex: 1; border: 1.5px solid var(--border); border-radius: 22px;
  padding: 10px 16px; font-size: 14px; color: var(--text); resize: none;
  outline: none; max-height: 100px; line-height: 1.5; background: var(--bg); }
.msg-input:focus { border-color: var(--p); background: white; }
.send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--grad);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 16px; color: white; font-weight: 900; box-shadow: 0 4px 14px rgba(155,89,182,0.4); }
.send-btn:disabled { background: #E0D0EE; box-shadow: none; }
.typing-row { display: flex; align-items: flex-end; gap: 8px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--p2);
  animation: bounce 1.2s ease-in-out infinite; display: inline-block; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.5} 40%{transform:translateY(-5px);opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: #2C1654; color: white; border-radius: 24px; padding: 10px 22px;
  font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: all .3s;
  pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.bookmark-btn { background: none; border: none; cursor: pointer; font-size: 15px;
  padding: 3px 5px; border-radius: 8px; opacity: 0.55; transition: opacity .2s, transform .2s;
  line-height: 1; flex-shrink: 0; align-self: flex-end; margin-bottom: 18px; }
.bookmark-btn:hover { opacity: 1; }
.bookmark-btn:active { transform: scale(0.85); }
#diaryScreen { background: var(--bg); }
.diary-entries { padding: 16px; overflow-y: auto; flex: 1; }
.diary-empty { display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; padding: 60px 24px; text-align: center; }
.diary-empty-emoji { font-size: 72px; margin-bottom: 16px; }
.diary-empty-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.diary-empty-sub { font-size: 14px; color: var(--sub); line-height: 1.7; }
.diary-card { background: white; border-radius: 20px; padding: 16px 18px;
  margin-bottom: 12px; box-shadow: var(--card-shadow); animation: fadeIn .25s ease; }
.diary-card-date { font-size: 11px; font-weight: 700; color: var(--p2);
  letter-spacing: .4px; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.diary-card-content { font-size: 15px; color: var(--text); line-height: 1.7;
  word-break: break-word; }
.avatar-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid transparent;
  background: white; font-size: 28px; cursor: pointer; transition: all .15s; margin: 6px; }
.avatar-btn.selected { border: 2px solid var(--p); box-shadow: 0 4px 12px rgba(155,89,182,0.25); }
.avatar-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 12px; }

/* Gift Shop */
.gift-overlay { display: none; position: fixed; inset: 0; background: rgba(44,22,84,0.45);
z-index: 9999; align-items: flex-end; justify-content: center; overflow: hidden; }
.gift-overlay.open { display: flex !important; }
.gift-modal { background: var(--bg); border-radius: 28px 28px 0 0; width: 100%; max-width: 520px;
  height: 70vh; min-height: 400px;
 display: flex; flex-direction: column;
  box-shadow: 0 -8px 40px rgba(155,89,182,0.22); animation: slideUp .28s ease;
  position: relative; bottom: 0;overflow: hidden; }

@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.gift-modal-header { padding: 18px 20px 10px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.gift-modal-title { font-size: 18px; font-weight: 900; }
.gift-close-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--border);
  font-size: 16px; color: var(--sub); display: flex; align-items: center; justify-content: center; }
.gift-counter { font-size: 12px; font-weight: 700; color: var(--p);
  background: #F5ECF9; border-radius: 20px; padding: 5px 12px; }
.gift-tabs { display: flex; gap: 6px; padding: 10px 16px 0; overflow-x: auto;
  flex-shrink: 0; scrollbar-width: none; }
.gift-tabs::-webkit-scrollbar { display: none; }
.gift-tab { white-space: nowrap; flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700; border: 1.5px solid var(--border);
  background: white; color: var(--sub); transition: all .15s; }
.gift-tab.active { background: var(--grad); color: white; border-color: transparent;
  box-shadow: 0 3px 10px rgba(155,89,182,0.3); }
.gift-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  padding: 14px 16px 28px; overflow-y: auto; flex: 1; min-height: 200px; }
.gift-card { background: white; border-radius: 18px; padding: 14px 10px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  box-shadow: 0 3px 12px rgba(155,89,182,0.09); transition: transform .15s, box-shadow .15s; }
.gift-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(155,89,182,0.16); }
.gift-card-emoji { font-size: 32px; line-height: 1; }
.gift-card-name { font-size: 12px; font-weight: 700; color: var(--text); text-align: center; }
.gift-send-btn { width: 100%; padding: 7px 0; border-radius: 12px;
  background: var(--grad); color: white; font-size: 11px; font-weight: 800;
  box-shadow: 0 3px 10px rgba(155,89,182,0.3); margin-top: 2px; }
.gift-send-btn:disabled { background: #E0D0EE; box-shadow: none; color: #B0A0C0; cursor: not-allowed; }
.gift-paid-btn { width: 100%; padding: 7px 0; border-radius: 12px;
  background: #F5F0FA; color: #B0A0C0; font-size: 10px; font-weight: 700;
  border: 1.5px solid var(--border); margin-top: 2px; cursor: not-allowed; }
.gift-success-banner { display: none; margin: 10px 16px 0; padding: 12px 16px;
  background: linear-gradient(135deg, #E8F8F0, #F0FFF8); border-radius: 16px;
  font-size: 13px; font-weight: 700; color: #27AE60; text-align: center;
  border: 1.5px solid #A9DFBF; }
.gift-success-banner.show { display: block; }

/* Bond Profile Modal */
.bond-overlay { display: none; position: fixed; inset: 0; background: rgba(44,22,84,0.5);
  z-index: 300; align-items: flex-end; justify-content: center; }
.bond-overlay.open { display: flex; }
.bond-modal { background: var(--bg); border-radius: 28px 28px 0 0; width: 100%; max-width: 520px;
  padding: 28px 24px 40px; box-shadow: 0 -8px 40px rgba(155,89,182,0.25);
  animation: slideUp .28s ease; }
.bond-modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border);
  margin: 0 auto 20px; }
.bond-companion-text { font-size: 22px; font-weight: 900; color: var(--text);
  text-align: center; margin-bottom: 6px; line-height: 1.4; }
.bond-level-badge { display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #F5ECF9, #FFF0F5); border-radius: 20px;
  padding: 6px 16px; font-size: 15px; font-weight: 800; color: var(--p);
  border: 1.5px solid var(--border); margin: 0 auto 20px; display: flex;
  justify-content: center; width: fit-content; }
.bond-progress-wrap { margin: 0 0 20px; }
.bond-progress-label { display: flex; justify-content: space-between;
  font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 8px; }
.bond-progress-bar { height: 10px; background: var(--border); border-radius: 10px; overflow: hidden; }
.bond-progress-fill { height: 100%; border-radius: 10px;
  background: var(--grad); transition: width .6s ease; }
.bond-stats { display: flex; gap: 12px; }
.bond-stat { flex: 1; background: white; border-radius: 18px; padding: 14px 12px;
  text-align: center; box-shadow: var(--card-shadow); }
.bond-stat-value { font-size: 22px; font-weight: 900; color: var(--p); margin-bottom: 4px; }
.bond-stat-label { font-size: 11px; font-weight: 700; color: var(--sub); }
.bond-close-btn { width: 100%; padding: 14px; border-radius: 16px; background: var(--grad);
  color: white; font-size: 15px; font-weight: 700; margin-top: 20px;
  box-shadow: 0 6px 20px rgba(155,89,182,0.3); }

/* Kid card bond info */
.kid-bond-info { font-size: 11px; color: var(--p); margin-top: 4px; font-weight: 700; }
.logo-wrap { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
.logo-wrap::before { content: ''; position: absolute; inset: -30px; border-radius: 50%; background: radial-gradient(circle, rgba(230,160,220,0.30) 0%, rgba(200,130,210,0.15) 50%, transparent 75%); animation: outerGlow 3s ease-in-out infinite alternate; }
@keyframes outerGlow { from { transform: scale(0.95); opacity: 0.7; } to { transform: scale(1.05); opacity: 1; } }
.orb { position: relative; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 45% 42%, rgba(180,100,160,0.80) 0%, rgba(155,80,175,0.85) 30%, rgba(130,60,165,0.88) 55%, rgba(110,45,148,0.92) 75%, rgba(85,30,128,0.96) 100%); box-shadow: inset 0 0 40px 10px rgba(220,130,200,0.35), 0 0 30px 8px rgba(220,140,210,0.55), 0 0 60px 20px rgba(185,100,195,0.35); animation: orbPulse 4s ease-in-out infinite; }
@keyframes orbPulse { 0%,100% { box-shadow: inset 0 0 40px 10px rgba(220,130,200,0.35), 0 0 30px 8px rgba(220,140,210,0.55), 0 0 60px 20px rgba(185,100,195,0.35); } 50% { box-shadow: inset 0 0 55px 16px rgba(220,130,200,0.48), 0 0 42px 14px rgba(220,140,210,0.70), 0 0 80px 28px rgba(185,100,195,0.48); } }
.orb::before { content: ''; position: absolute; top: 8%; left: 12%; width: 24%; height: 18%; border-radius: 50%; background: radial-gradient(ellipse at 40% 30%, rgba(255,255,255,0.88) 0%, rgba(255,255,255,0.35) 50%, transparent 100%); transform: rotate(-20deg); filter: blur(2px); }
.orbit-ring { position: absolute; border-radius: 50%; border: 1.5px solid rgba(180,230,255,0.6); box-shadow: 0 0 8px rgba(160,220,255,0.4); animation: spin linear infinite; }
.orbit-ring-1 { width: 178px; height: 178px; transform: rotate(-25deg) rotateX(70deg); animation-duration: 6s; }
.orbit-ring-2 { width: 196px; height: 196px; animation-duration: 9s; animation-direction: reverse; border-color: rgba(200,180,240,0.45); }
@keyframes spin { from { transform: rotate(-25deg) rotateX(70deg) rotateZ(0deg); } to { transform: rotate(-25deg) rotateX(70deg) rotateZ(360deg); } }
.orbit-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; background: rgba(220,240,255,0.95); box-shadow: 0 0 6px 2px rgba(180,230,255,0.8); top: -3px; left: 50%; transform: translateX(-50%); }
.plant-svg { position: absolute; width: 72px; height: 72px; bottom: 22%; left: 50%; transform: translateX(-50%); filter: drop-shadow(0 0 5px rgba(210,240,60,0.95)) drop-shadow(0 0 14px rgba(180,225,40,0.75)); animation: plantFloat 3.5s ease-in-out infinite; }
@keyframes plantFloat { 0%,100% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-5px); } }
.sparkle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: white; box-shadow: 0 0 4px 2px rgba(255,255,255,0.8); animation: sparkleAnim 2.5s ease-in-out infinite; }
.sparkle:nth-child(1) { top: 18%; left: 22%; animation-delay: 0s; }
.sparkle:nth-child(2) { top: 28%; right: 18%; animation-delay: 0.7s; width: 3px; height: 3px; }
.sparkle:nth-child(3) { top: 55%; left: 14%; animation-delay: 1.2s; width: 3px; height: 3px; }
.sparkle:nth-child(4) { top: 15%; left: 55%; animation-delay: 1.8s; }
.sparkle:nth-child(5) { bottom: 22%; right: 20%; animation-delay: 0.4s; width: 3px; height: 3px; }
@keyframes sparkleAnim { 0%,100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
.bud-container { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.bud-glow { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(230,160,220,0.4) 0%, transparent 70%); animation: budBreath 3s ease-in-out infinite; }
@keyframes budBreath { 0%,100% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } }
.bud-appear { animation: budShake 0.4s ease; }
@keyframes budShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

<script>
const API = "";
let token = localStorage.getItem("token") || "";
let kid = null;
let isReg = false;
let selGender = "boy";
let selRole = "妈妈";
let selPersonality = "lively";
let selAvatar = null;

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
   if (id === "createScreen") { startCreateDialog(); }
}
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}
function req(path, opts={}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);
  return fetch(API+path, {
    headers:{"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{})},
    signal: controller.signal,
    ...opts
  }).then(async r => { 
    clearTimeout(timeout);
    const d=await r.json(); 
    if(!r.ok) throw new Error(d.error||"请求失败"); 
    return d; 
  }).catch(e => {
    clearTimeout(timeout);
    if (e.name === 'AbortError') throw new Error("响应超时，请重试");
    throw e;
  });
}

function autoResize(el) { el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,100)+"px"; }

function toggleReg() {
  isReg=!isReg;
  document.querySelector(".login-switch span").textContent=isReg?"返回登录":"立即注册";
  document.getElementById("loginBtn").textContent=isReg?"注册":"登录";
  document.getElementById("loginErr").textContent="";
}
async function doLogin() {
  const email=document.getElementById("loginEmail").value.trim();
  const pwd=document.getElementById("loginPwd").value;
  const err=document.getElementById("loginErr");
  err.textContent="";
  if(!email||!pwd) return err.textContent="请填写邮箱和密码";
  const btn=document.getElementById("loginBtn");
  btn.textContent="请稍候…";

  try {
    const d=await req(`/api/${isReg?"register":"login"}`,{method:"POST",body:JSON.stringify({email,password:pwd})});
    token=d.token; localStorage.setItem("token",token);
    document.getElementById("homeScreen").classList.remove("empty-mode");
showScreen("homeScreen"); loadKids();

  } catch(e) { err.textContent=e.message; }

  finally { btn.textContent=isReg?"注册":"登录"; }
}
function logout() { token=""; localStorage.clear(); showScreen("loginScreen"); }

const MOODS=["😊","😄","🥰","😌","🤩","😎"];
const BOND_LEVELS = [
  { min: 0,    max: 50,   emoji: "☁️",  name: "初识" },
  { min: 51,   max: 150,  emoji: "🌱",  name: "萌芽" },
  { min: 151,  max: 300,  emoji: "🌸",  name: "温暖" },
  { min: 301,  max: 500,  emoji: "⭐",  name: "亲密" },
  { min: 501,  max: 1000, emoji: "💫",  name: "挚爱" },
  { min: 1001, max: Infinity, emoji: "👑", name: "永恒" },
];
  // ── Bond System ────────────────────────────────────────────────────────────


function getBondLevel(score) {
  for (const lvl of BOND_LEVELS) {
    if (score >= lvl.min && score <= lvl.max) return lvl;
  }
  return BOND_LEVELS[BOND_LEVELS.length - 1];
}
  async function loadKids() {
  try {
    const kids=await req("/api/kids");
    const list=document.getElementById("kidsList");
    if(!kids.length) {
    document.getElementById("homeScreen").classList.add("empty-mode");  
      list.innerHTML=`<div class="empty-wrap">

          <stop offset="0%" stop-color="#70b020"/><stop offset="100%" stop-color="#d0e848"/>
        </linearGradient>
        <radialGradient id="budG" cx="46%" cy="40%" r="54%">
          <stop offset="0%" stop-color="#f0f850"/><stop offset="100%" stop-color="#90c018" stop-opacity="0.70"/>
        </radialGradient>
      </defs>
      <path d="M36 66 C36 56 36 46 36 36" stroke="url(#stemG)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M36 44 C34 40 28 32 18 22 C16 20 15 22 16 25 C20 32 28 38 34 42 C35 43 36 44 36 44 Z" fill="url(#leafLG)" opacity="0.93"/>
      <path d="M36 40 C38 36 44 28 54 18 C56 16 57 18 56 21 C52 28 44 34 38 39 C37 40 36 40 36 40 Z" fill="url(#leafRG)" opacity="0.90"/>
      <path d="M36 36 C36 28 40 20 44 16 C48 12 53 13 54 17 C55 22 51 30 46 33 C42 36 36 34 36 36 Z" fill="url(#budG)"/>
      <circle cx="42" cy="16" r="1.3" fill="rgba(255,255,255,0.97)"/>

</div>`; return;
    }
    document.getElementById("homeScreen").classList.remove("empty-mode");
    list.innerHTML=kids.map((k,i)=>{
  const bl=getBondLevel(k.bond_score||0);
  const compDays=k.companion_days||0;

          ${k.avatar ? k.avatar : getBudAvatar(k.gender)}<div class="kid-badge">✦</div>

  } catch(e) { showToast(e.message || "loadKids错误"); if(e.message?.includes("登录")) logout(); }

    } else if (createStep === 2) {

function formatDiaryDate(iso) {
  const d = new Date(iso);
  const y = d.getFullYear();
  const mo = d.getMonth() + 1;
  const day = d.getDate();
  const h = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  return `${y}年${mo}月${day}日 ${h}:${mi}`;
}

function getZodiacSign(dateString) {
  if (!dateString) return null;
  const parts = dateString.split("-");
  const month = parseInt(parts[1], 10);
  const day = parseInt(parts[2], 10);
  const signs = [
    { emoji: "♑", name: "摩羯座", traits: "沉稳成熟,有责任心", from: [12, 22], to: [1, 19] },
    { emoji: "♒", name: "水瓶座", traits: "独立创意,想法新奇", from: [1, 20], to: [2, 18] },
    { emoji: "♓", name: "双鱼座", traits: "温柔梦幻,富有想象", from: [2, 19], to: [3, 20] },
    { emoji: "♈", name: "白羊座", traits: "勇敢直接,充满活力", from: [3, 21], to: [4, 19] },
    { emoji: "♉", name: "金牛座", traits: "稳重可靠,热爱舒适", from: [4, 20], to: [5, 20] },
    { emoji: "♊", name: "双子座", traits: "聪慧灵动,充满好奇", from: [5, 21], to: [6, 20] },
    { emoji: "♋", name: "巨蟹座", traits: "温柔体贴,恋家宝宝", from: [6, 21], to: [7, 22] },
    { emoji: "♌", name: "狮子座", traits: "自信热情,爱被关注", from: [7, 23], to: [8, 22] },
    { emoji: "♍", name: "处女座", traits: "细心周到,乐于帮助", from: [8, 23], to: [9, 22] },
    { emoji: "♎", name: "天秤座", traits: "温和友善,追求平衡", from: [9, 23], to: [10, 22] },
    { emoji: "♏", name: "天蝎座", traits: "深情专注,直觉敏锐", from: [10, 23], to: [11, 21] },
    { emoji: "♐", name: "射手座", traits: "乐观开朗,爱冒险", from: [11, 22], to: [12, 21] },
  ];
  for (const s of signs) {
    const [fm, fd] = s.from;
    const [tm, td] = s.to;
    if (fm <= tm) {
      if ((month === fm && day >= fd) || (month === tm && day <= td) || (month > fm && month < tm)) return s;
    } else {
      if ((month === fm && day >= fd) || (month === tm && day <= td) || month > fm || month < tm) return s;
    }
  }
  return null;
}

function getBondProgress(score) {
  for (let i = 0; i < BOND_LEVELS.length; i++) {
    const lvl = BOND_LEVELS[i];
    if (score >= lvl.min && score <= lvl.max) {
      const next = BOND_LEVELS[i + 1];
      if (!next) return { pct: 100, nextScore: null, nextName: null };
      const range = next.min - lvl.min;
      const progress = score - lvl.min;
      return {
        pct: Math.min(100, Math.round((progress / range) * 100)),
        nextScore: next.min,
        nextName: next.emoji + next.name,
      };
    }
  }
  return { pct: 100, nextScore: null, nextName: null };
}

async function refreshGiftCounter() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    // Fetch today's used count from the gifts list (approximate via API)
    // We'll track it locally from send responses; initialise from a quick probe
    const r = await req(`/api/kids/${kid.id}/gifts`);
    const todayFree = r.filter(g => {
      return g.gift_type === "free" && g.created_at && g.created_at.slice(0, 10) === today;
    }).length;
    giftUsed = todayFree;
    if (!giftLimit) giftLimit = 1;
    // Default limit; will be updated on send response
    updateGiftCounterUI();
  } catch(e) { alert("refreshGiftCounter error: " + e.message); }
}

function updateGiftCounterUI() {
  document.getElementById("giftCounter").textContent = `今日免费: ${giftUsed}/${giftLimit}`;
}

  const tabs = document.getElementById("giftTabs");
  tabs.innerHTML = GIFT_CATEGORIES.map(cat =>

function renderGiftGrid() {
  const cat = GIFT_CATEGORIES.find(c => c.id === giftActiveCat);
 if (!cat) { alert("cat not found: " + giftActiveCat); return; } 
  const isFree = cat.type === "free";
  const limitReached = isFree && giftUsed >= giftLimit;
  const level = cat.gift_level || "free";
  alert("items count: " + cat.items.length);
document.getElementById("giftGrid").innerHTML = cat.items.map(item => {
    const btnHtml = isFree
      ? `<button class="gift-send-btn" ${limitReached ? "disabled" : ""}
           onclick="sendGift('${item.emoji}','${item.name}','free','${level}')">
           ${limitReached ? "已用完" : "送出 ✨"}

      : `<button class="gift-paid-btn" disabled>💰 即将开放</button>`;
    return `<div class="gift-card">

async function sendGift(emoji, name, type, level) {
  if (!kid) return;
  // Disable all send buttons during request
  document.querySelectorAll(".gift-send-btn").forEach(b => b.disabled = true);
  try {
    const d = await req(`/api/kids/${kid.id}/gifts`, {
      method: "POST",
      body: JSON.stringify({ gift_emoji: emoji, gift_name: name, gift_type: type, gift_level: level || "free" })
    });
    if (d.status === "payment_required") {
      showToast("💰 " + d.message);
      return;
    }
    giftUsed = d.used;
    giftLimit = d.limit || 1;
    updateGiftCounterUI();
    const banner = document.getElementById("giftSuccessBanner");
    banner.textContent = `✨ ${emoji} ${name} 已送出！宝宝会很开心的～`;
    banner.classList.add("show");
    setTimeout(() => banner.classList.remove("show"), 3500);
    renderGiftGrid();
    if (d.thankMsg) { const msgs = await req(`/api/kids/${kid.id}/messages`); renderMsgs(msgs); closeGiftShop(); }

  } catch(e) {
    showToast(e.message || "送礼失败");
    renderGiftGrid();
  }
}
